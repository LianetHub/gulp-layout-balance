<div id="appointment" class="popup" role="dialog" aria-modal="true" hidden>
    <h2 class="popup__title title">Онлайн-запись в&nbsp;Balance Med</h2>
    <p class="popup__subtitle">Наш администратор свяжется с Вами в течение 15 минут.</p>
    <form action="#" class="popup__form form">
        <input type="text" name="username" class="form__control" placeholder="Ваше имя">
        <input type="tel" name="phone" class="form__control" placeholder="+7 (999) 999-99-99">
        <div class="form__bottom">
            <button type="submit" class="form__submit btn btn-primary btn-lg">Оставить заявку</button>
        </div>
        <div class="form__policy">
            Нажимая на кнопку, вы соглашаетесь с <a href="">Политикой конфиденциальности</a>
        </div>
    </form>
</div>

<div id="success" class="popup popup--small" role="dialog" aria-modal="true" hidden>
    <h2 class="popup__title title-sm">Спасибо! <br> Ваша заявка принята!</h2>
    <p class="popup__subtitle popup__subtitle--small">Наш администратор свяжется с Вами в ближайшее время</p>
</div>
